name: Daily GeM Bot

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Libraries
        run: pip install requests

      - name: Run Bot
        run: python gem_bot.py

      - name: Save Seen Bids
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@email.com"
          git add seen.txt
          git commit -m "update bids" || echo "no changes"
          git push
